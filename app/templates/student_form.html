{% extends "base.html" %}
{% block content %}
<div class="page-head"><h1>{{ "Modifica iscritto" if student else "Nuovo iscritto" }}</h1></div>
<form class="form" method="post" action="{{ action }}">
  <div class="form-grid">
    <label>Nome <input name="first_name" value="{{ student.first_name if student else '' }}" required></label>
    <label>Cognome <input name="last_name" value="{{ student.last_name if student else '' }}" required></label>
    <label>Email <input name="email" type="email" value="{{ student.email if student else '' }}" required></label>
    <label>Telefono <input name="phone" value="{{ student.phone if student else '' }}"></label>
    <label>Azienda/ente <input name="organization" value="{{ student.organization if student else '' }}"></label>
  </div>
  <label>Note <textarea name="notes" rows="4">{{ student.notes if student else '' }}</textarea></label>
  <div class="actions">
    <button class="button primary" type="submit">Salva</button>
    <a class="button ghost" href="{{ '/students/' ~ student.id if student else '/students' }}">Annulla</a>
  </div>
</form>
{% endblock %}
