{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>{{ "Modifica corso" if course else "Nuovo corso" }}</h1>
  </div>
</div>
<form class="form" method="post" action="{{ action }}">
  <label>Titolo
    <input name="title" value="{{ course.title if course else '' }}" required maxlength="255">
  </label>
  <label>Descrizione breve
    <textarea name="short_description" rows="4">{% if course and course.short_description and not course.short_description.startswith('Importato dal foglio') %}{{ course.short_description }}{% endif %}</textarea>
  </label>
  <div class="form-grid">
    <label>Durata indicativa
      <input name="duration" value="{{ course.duration if course else '' }}">
    </label>
    <label>Stato
      <select name="status">
        <option value="attivo" {% if not course or course.status == 'attivo' %}selected{% endif %}>attivo</option>
        <option value="archiviato" {% if course and course.status == 'archiviato' %}selected{% endif %}>archiviato</option>
      </select>
    </label>
  </div>
  <div class="actions">
    <button class="button primary" type="submit">Salva</button>
    <a class="button ghost" href="/excel-courses">Annulla</a>
  </div>
</form>
{% endblock %}
